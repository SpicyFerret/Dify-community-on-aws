name: 'Deploy App (Dify)'

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/app.yml'
  workflow_dispatch:
    inputs:
      dify_version:
        description: 'Tag do Dify a subir (sobrepoe a variable DIFY_VERSION)'
        type: string
        required: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  INSTANCE_TAG: 'dify-prod'
  # Versao do Dify: input manual > repository variable DIFY_VERSION > default.
  DIFY_VERSION: ${{ github.event.inputs.dify_version || vars.DIFY_VERSION || '1.4.3' }}
  # Hostname publico (mesmo do tunnel Cloudflare). Fixa as URLs HTTPS do console
  # no .env -> redirect_uri correto do OAuth dos datasources (Google Drive etc.).
  # Reusa o TF_VAR_app_hostname que a infra ja define como secret (e' so' um DNS
  # publico, nao um segredo de fato -- por isso pode trafegar no payload do SSM).
  APP_HOSTNAME: ${{ vars.APP_HOSTNAME || secrets.TF_VAR_app_hostname }}
  # E-mail (SES) - OPCIONAL. Deixe MAIL_TYPE vazio para nao configurar e-mail.
  # Os valores nao-secretos vem de repository variables; a senha vem do secret
  # SMTP_PASSWORD (publicado no Parameter Store, lido na instancia pela role).
  MAIL_TYPE: ${{ vars.MAIL_TYPE }}
  MAIL_DEFAULT_SEND_FROM: ${{ vars.MAIL_DEFAULT_SEND_FROM }}
  SMTP_SERVER: ${{ vars.SMTP_SERVER }}
  SMTP_PORT: ${{ vars.SMTP_PORT }}
  SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
  SMTP_USE_TLS: ${{ vars.SMTP_USE_TLS }}
  SMTP_OPPORTUNISTIC_TLS: ${{ vars.SMTP_OPPORTUNISTIC_TLS }}

permissions:
  contents: read

jobs:
  # Em PR: apenas valida o script de deploy (sem tocar na infra).
  validate:
    name: Validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck (app/deploy.sh)
        run: shellcheck app/deploy.sh

  # Em push na main ou disparo manual: faz o deploy via SSM Run Command.
  deploy:
    name: Deploy via SSM
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Descobre conta, nome do bucket (deterministico) e a instancia (por tag).
      - name: Resolve targets
        run: |
          set -euo pipefail
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          S3_BUCKET_NAME="dify-prod-${ACCOUNT_ID}-${AWS_REGION}"
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_TAG}" \
                      "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId | [0]' --output text)"
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Instancia com tag Name=${INSTANCE_TAG} nao encontrada"
            exit 1
          fi
          echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}" >>"$GITHUB_ENV"
          echo "INSTANCE_ID=${INSTANCE_ID}" >>"$GITHUB_ENV"
          echo "Instancia: ${INSTANCE_ID} | bucket: ${S3_BUCKET_NAME} | dify: ${DIFY_VERSION}"

      # A maquina pode estar parada (agendamento 08-18h). Liga e espera.
      - name: Ensure instance running
        run: |
          set -euo pipefail
          STATE="$(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[].Instances[].State.Name | [0]' --output text)"
          echo "Estado atual: ${STATE}"
          if [ "$STATE" != "running" ]; then
            echo "Iniciando instancia..."
            aws ec2 start-instances --instance-ids "$INSTANCE_ID" >/dev/null
            aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          fi

      - name: Wait for SSM agent online
        run: |
          set -euo pipefail
          echo "Aguardando o agente SSM ficar Online..."
          for i in $(seq 1 30); do
            PING="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || echo None)"
            echo "  tentativa ${i}: PingStatus=${PING}"
            [ "$PING" = "Online" ] && exit 0
            sleep 10
          done
          echo "::error::Agente SSM nao ficou Online a tempo"
          exit 1

      # E-mail (SES): publica a senha SMTP no Parameter Store (SecureString) para
      # o deploy.sh ler na instancia via instance role. A senha NUNCA entra no
      # payload do SSM. Pula em silencio se o secret SMTP_PASSWORD nao existir.
      - name: Sync SMTP password to Parameter Store
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SMTP_PASSWORD}" ]; then
            echo "secrets.SMTP_PASSWORD vazio -> e-mail desabilitado; nada a publicar."
            exit 0
          fi
          aws ssm put-parameter \
            --name "/${INSTANCE_TAG}/smtp_password" \
            --type SecureString \
            --value "${SMTP_PASSWORD}" \
            --overwrite >/dev/null
          echo "Senha SMTP publicada em /${INSTANCE_TAG}/smtp_password"

      - name: Run deploy via SSM
        run: |
          set -euo pipefail
          # Monta o payload: exports + deploy.sh. Usa arquivo + 'jq --rawfile' para
          # PRESERVAR as quebras de linha. (Command substitution $(...) remove o \n
          # final, o que colava 'export S3_REGION=...' no shebang do deploy.sh.)
          # A senha SMTP NAO vai aqui: o deploy.sh a le do Parameter Store.
          {
            printf 'export DIFY_VERSION=%q\n'           "$DIFY_VERSION"
            printf 'export S3_BUCKET_NAME=%q\n'         "$S3_BUCKET_NAME"
            printf 'export S3_REGION=%q\n'              "$AWS_REGION"
            printf 'export APP_HOSTNAME=%q\n'           "${APP_HOSTNAME:-}"
            printf 'export MAIL_TYPE=%q\n'              "${MAIL_TYPE:-}"
            printf 'export MAIL_DEFAULT_SEND_FROM=%q\n' "${MAIL_DEFAULT_SEND_FROM:-}"
            printf 'export SMTP_SERVER=%q\n'            "${SMTP_SERVER:-}"
            printf 'export SMTP_PORT=%q\n'              "${SMTP_PORT:-}"
            printf 'export SMTP_USERNAME=%q\n'          "${SMTP_USERNAME:-}"
            printf 'export SMTP_USE_TLS=%q\n'           "${SMTP_USE_TLS:-}"
            printf 'export SMTP_OPPORTUNISTIC_TLS=%q\n' "${SMTP_OPPORTUNISTIC_TLS:-}"
            printf 'export SMTP_PASSWORD_PARAM=%q\n'    "/${INSTANCE_TAG}/smtp_password"
            cat app/deploy.sh
          } >/tmp/dify-deploy-payload.sh

          # jq escapa o script com seguranca; 'commands' e' uma lista de strings.
          PARAMS="$(jq -n --rawfile s /tmp/dify-deploy-payload.sh '{commands: [$s]}')"

          CMD_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy Dify ${DIFY_VERSION}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)"
          echo "CommandId: ${CMD_ID}"

          echo "Acompanhando execucao (timeout ~15 min)..."
          STATUS="Pending"
          for i in $(seq 1 90); do
            sleep 10
            STATUS="$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo Pending)"
            echo "  [${i}] status=${STATUS}"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
          done

          echo "::group::stdout (truncado pelo SSM em ~24k chars)"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text || true
          echo "::endgroup::"
          echo "::group::stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text || true
          echo "::endgroup::"

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy via SSM falhou (status=${STATUS})"
            exit 1
          fi
          # O healthcheck do app roda dentro do deploy.sh (curl localhost), entao o
          # status Success acima ja reflete que o Dify respondeu 2xx/3xx na maquina.
